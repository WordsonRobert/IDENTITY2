{{- define "main" }}

<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    {{- if .Params.author }}
    <div class="post-meta">
      {{ delimit .Params.author ", " }} • {{ .Date.Format "January 2, 2006" }}
    </div>
    {{- end }}
  </header>
  <div class="post-content">
    {{- .Content }}
  </div>

  <div style="margin-top: 50px;">
    {{ partial "comments.html" . }}
  </div>

</article>

{{- end }}
